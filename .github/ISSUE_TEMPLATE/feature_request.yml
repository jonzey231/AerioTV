name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: input
    id: version
    attributes:
      label: App Version
      description: What version are you currently running?
      placeholder: e.g. v1.6.3
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / Environment
      description: Device model and OS version (iOS, iPadOS, tvOS)
      placeholder: e.g. Apple TV 4K, tvOS 18.2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Detailed Description
      description: Describe the feature, the problem it solves, and any context, examples, or alternatives you've considered.
      placeholder: |
        **Problem / use case:**

        **Proposed solution:**

        **Alternatives considered:**

        **Additional context:**
    validations:
      required: true
